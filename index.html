<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Explorador territorial electoral — Chile</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css?v=6">
</head>
<body>
<aside id="side">
  <div class="sb-head">
    <div class="nav"><b>Explorador</b> · <a href="tendencia.html">Tendencia</a> · <a href="recintos.html">Recintos</a></div>
    <h1>Explorador territorial</h1>
    <p class="sb-sub">Resultados por comuna y por local de votación · Chile 2013–2025</p>
  </div>
  <div class="sb-search"><input id="buscar" type="text" autocomplete="off" placeholder="Buscar comuna…"></div>
  <div id="menu"></div>
</aside>
<main>
  <div id="topbar">
    <div class="tb-grp"><span class="tb-lbl">Año</span><div id="anios"></div></div>
    <div class="tb-grp"><span class="tb-lbl">Elección</span><div id="elecs"><span class="tb-hint">elige un año</span></div></div>
    <div class="tb-grp"><span class="tb-lbl">Nivel</span><div id="niveles"></div></div>
    <div class="tb-grp"><span class="tb-lbl">Color</span>
      <select id="capa">
        <option value="electoral" selected>Resultado (ganador)</option>
        <option value="escolaridad">Escolaridad (años)</option>
        <option value="pct_extranjeros">% extranjeros</option>
        <option value="pct_indigena">% pueblos originarios</option>
        <option value="pct_mujeres">% mujeres</option>
        <option value="pct_60mas">% 60+ años</option>
        <option value="pct_jov1824">% jóvenes 18-24</option>
      </select>
    </div>
  </div>
  <div id="map"></div>
  <div id="resumen" class="resumen">Elige una comuna en el menú.</div>
  <div id="leg2"></div>
</main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="explorador.js?v=8"></script>
</body>
</html>
